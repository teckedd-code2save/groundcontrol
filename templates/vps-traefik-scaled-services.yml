name: "VPS Traefik Scaled Services"
description: "Traefik-label stack for scale-ready web/API services with middleware, protected dashboard, PostgreSQL, Redis, and observability hooks."
category: "microservices"
version: "2.0"
requires:
  docker: true
  traefik: true
reverse_proxy:
  type: traefik
components:
  - id: traefik
    label: Traefik edge router
    layer: traffic
    kind: proxy
    service: traefik
  - id: web
    label: Replicable web service
    layer: application
    kind: service
    service: web
  - id: api
    label: Replicable API service
    layer: application
    kind: service
    service: api
  - id: postgres
    label: PostgreSQL database
    layer: data
    kind: database
    service: postgres
  - id: redis
    label: Redis cache/queue
    layer: data
    kind: cache
    service: redis
  - id: dashboard
    label: Protected Traefik dashboard
    layer: observability
    kind: dashboard
services:
  - name: traefik
    image: "traefik:v3.1"
    command: "--api.dashboard=true --providers.docker=true --providers.docker.exposedbydefault=false --entrypoints.web.address=:80 --entrypoints.websecure.address=:443 --certificatesresolvers.letsencrypt.acme.email={{acme_email}} --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json --certificatesresolvers.letsencrypt.acme.httpchallenge=true --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/letsencrypt
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`{{dashboard_domain}}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
    restart: unless-stopped
  - name: web
    image: "{{web_image}}"
    env:
      - API_URL=https://{{api_domain}}
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`{{web_domain}}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port={{web_port}}
    depends_on:
      - api
    restart: unless-stopped
  - name: api
    image: "{{api_image}}"
    env:
      - PORT={{api_port}}
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379
      - APP_SECRET={{app_secret}}
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`{{api_domain}}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port={{api_port}}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  - name: postgres
    image: "postgres:16-alpine"
    env:
      - POSTGRES_USER={{db_user}}
      - POSTGRES_PASSWORD={{db_password}}
      - POSTGRES_DB={{db_name}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  - name: redis
    image: "redis:7-alpine"
    volumes:
      - redis_data:/data
    restart: unless-stopped
volumes:
  - traefik_data
  - postgres_data
  - redis_data
networks:
  - app_network
inputs:
  - name: app_slug
    prompt: "Deployment slug"
    default: "traefik-services"
  - name: web_domain
    prompt: "Web domain"
    example: "app.example.com"
  - name: api_domain
    prompt: "API domain"
    example: "api.example.com"
  - name: dashboard_domain
    prompt: "Traefik dashboard domain"
    example: "traefik.example.com"
  - name: acme_email
    prompt: "Let's Encrypt email"
    example: "admin@example.com"
  - name: web_image
    prompt: "Web image"
    default: "nginxdemos/hello:latest"
  - name: api_image
    prompt: "API image"
    default: "nginxdemos/hello:latest"
  - name: web_port
    prompt: "Web container port"
    default: "80"
  - name: api_port
    prompt: "API container port"
    default: "80"
  - name: db_user
    prompt: "Database user"
    default: "app"
  - name: db_password
    prompt: "Database password"
    generate: true
  - name: db_name
    prompt: "Database name"
    default: "app"
  - name: app_secret
    prompt: "Application secret"
    generate: true
