name: "VPS Caddy Commerce Secure"
description: "Caddy-first commerce/SaaS stack with web, API, worker, PostgreSQL/PostGIS, Redis, MinIO, healthchecks, generated secrets, and strict security headers."
category: "commerce"
version: "2.0"
requires:
  docker: true
  caddy: true
reverse_proxy:
  type: caddy
  sites:
    - domain: "{{web_domain}}"
      proxy_to: "127.0.0.1:{{web_host_port}}"
    - domain: "{{api_domain}}"
      proxy_to: "127.0.0.1:{{api_host_port}}"
components:
  - id: cloudflare
    label: Cloudflare DNS/WAF
    layer: edge
    kind: dns
  - id: caddy
    label: Caddy edge proxy
    layer: traffic
    kind: proxy
  - id: web
    label: Web storefront/app
    layer: application
    kind: service
    service: web
  - id: api
    label: API/backend service
    layer: application
    kind: service
    service: api
  - id: worker
    label: Background worker
    layer: application
    kind: worker
    service: worker
  - id: postgres
    label: PostgreSQL/PostGIS
    layer: data
    kind: database
    service: postgres
  - id: redis
    label: Redis cache/queue
    layer: data
    kind: cache
    service: redis
  - id: minio
    label: MinIO object storage
    layer: data
    kind: object-storage
    service: minio
  - id: healthchecks
    label: Compose healthchecks/restart policies
    layer: resilience
    kind: health
services:
  - name: web
    image: "{{web_image}}"
    ports:
      - "127.0.0.1:{{web_host_port}}:{{web_port}}"
    env:
      - NODE_ENV=production
      - PORT={{web_port}}
      - API_URL=https://{{api_domain}}
      - APP_SECRET={{app_secret}}
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://localhost:{{web_port}}{{web_health_path}} || exit 1"
      interval: "30s"
      timeout: "5s"
      retries: 5
  - name: api
    image: "{{api_image}}"
    ports:
      - "127.0.0.1:{{api_host_port}}:{{api_port}}"
    env:
      - NODE_ENV=production
      - PORT={{api_port}}
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET={{s3_bucket}}
      - S3_ACCESS_KEY={{s3_access_key}}
      - S3_SECRET_KEY={{s3_secret_key}}
      - JWT_SECRET={{jwt_secret}}
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://localhost:{{api_port}}{{api_health_path}} || exit 1"
      interval: "30s"
      timeout: "5s"
      retries: 5
  - name: worker
    image: "{{worker_image}}"
    command: "{{worker_command}}"
    env:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET={{s3_bucket}}
      - S3_ACCESS_KEY={{s3_access_key}}
      - S3_SECRET_KEY={{s3_secret_key}}
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
  - name: postgres
    image: "{{postgres_image}}"
    env:
      - POSTGRES_USER={{db_user}}
      - POSTGRES_PASSWORD={{db_password}}
      - POSTGRES_DB={{db_name}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U {{db_user}} -d {{db_name}}"
      interval: "10s"
      timeout: "5s"
      retries: 10
  - name: redis
    image: "redis:7-alpine"
    command: "redis-server --appendonly yes"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: "redis-cli ping | grep PONG"
      interval: "10s"
      timeout: "3s"
      retries: 10
  - name: minio
    image: "minio/minio:RELEASE.2025-04-22T22-12-26Z"
    command: "server /data --console-address :9001"
    env:
      - MINIO_ROOT_USER={{s3_access_key}}
      - MINIO_ROOT_PASSWORD={{s3_secret_key}}
    volumes:
      - minio_data:/data
    restart: unless-stopped
volumes:
  - postgres_data
  - redis_data
  - minio_data
networks:
  - app_network
inputs:
  - name: app_slug
    prompt: "Deployment slug"
    default: "commerce-app"
  - name: web_domain
    prompt: "Web domain"
    example: "shop.example.com"
  - name: api_domain
    prompt: "API domain"
    example: "api.example.com"
  - name: web_image
    prompt: "Web image"
    default: "nginxdemos/hello:latest"
  - name: api_image
    prompt: "API image"
    default: "nginxdemos/hello:latest"
  - name: worker_image
    prompt: "Worker image"
    default: "busybox:1.36"
  - name: worker_command
    prompt: "Worker command"
    default: "sh -c 'while true; do sleep 3600; done'"
  - name: postgres_image
    prompt: "Database image"
    default: "postgis/postgis:16-3.4"
  - name: web_port
    prompt: "Web container port"
    default: "80"
  - name: api_port
    prompt: "API container port"
    default: "80"
  - name: web_host_port
    prompt: "Web host loopback port"
    default: "13020"
  - name: api_host_port
    prompt: "API host loopback port"
    default: "13021"
  - name: web_health_path
    prompt: "Web health path"
    default: "/"
  - name: api_health_path
    prompt: "API health path"
    default: "/"
  - name: db_user
    prompt: "Database user"
    default: "app"
  - name: db_password
    prompt: "Database password"
    generate: true
  - name: db_name
    prompt: "Database name"
    default: "app"
  - name: s3_bucket
    prompt: "Object storage bucket"
    default: "uploads"
  - name: s3_access_key
    prompt: "Object storage access key"
    default: "groundcontrol"
  - name: s3_secret_key
    prompt: "Object storage secret"
    generate: true
  - name: jwt_secret
    prompt: "JWT secret"
    generate: true
  - name: app_secret
    prompt: "Application secret"
    generate: true
