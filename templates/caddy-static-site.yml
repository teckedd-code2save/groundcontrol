name: "Caddy + Static Site"
description: "Serve a static website or SPA behind Caddy with Gzip, security headers, and auto-renewing TLS."
category: "static"
version: "1.0"
requires:
  docker: true
  caddy: true
reverse_proxy:
  type: caddy
  sites:
    - domain: "{{domain}}"
      root: "/var/www/{{app_slug}}"
services:
  - name: static
    image: "nginx:alpine"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    ports:
      - "{{app_port}}:80"
    restart: unless-stopped
volumes: []
inputs:
  - name: domain
    prompt: "Domain for your static site"
    example: "docs.example.com"
  - name: app_slug
    prompt: "Project slug"
    default: "my-site"
  - name: app_port
    prompt: "Internal port"
    default: "8080"
