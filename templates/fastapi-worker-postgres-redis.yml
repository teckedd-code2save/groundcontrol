name: "FastAPI + Worker + PostgreSQL + Redis"
description: "Python API stack with FastAPI/Uvicorn, background worker, PostgreSQL, Redis, Caddy TLS, and healthchecks."
category: "api"
version: "1.0"
requires:
  docker: true
  caddy: true
reverse_proxy:
  type: caddy
  sites:
    - domain: "{{domain}}"
      proxy_to: "api:{{app_port}}"
services:
  - name: api
    build: true
    command: "uvicorn {{asgi_app}} --host 0.0.0.0 --port {{app_port}} --workers {{api_workers}}"
    ports:
      - "{{app_port}}"
    env:
      - ENV=production
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY={{app_secret}}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://localhost:{{app_port}}/health || exit 1"
      interval: "30s"
      timeout: "5s"
      retries: 5
  - name: worker
    build: true
    command: "{{worker_command}}"
    env:
      - ENV=production
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY={{app_secret}}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  - name: postgres
    image: "postgres:16-alpine"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env:
      - POSTGRES_USER={{db_user}}
      - POSTGRES_PASSWORD={{db_password}}
      - POSTGRES_DB={{db_name}}
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U {{db_user}} -d {{db_name}}"
      interval: "10s"
      timeout: "3s"
      retries: 5
  - name: redis
    image: "redis:7-alpine"
    command: "redis-server --appendonly yes"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: "redis-cli ping | grep PONG"
      interval: "10s"
      timeout: "3s"
      retries: 5
volumes:
  - postgres_data
  - redis_data
inputs:
  - name: domain
    prompt: "Domain for your API"
    example: "api.example.com"
  - name: app_port
    prompt: "Internal API port"
    default: "8000"
  - name: asgi_app
    prompt: "ASGI app import path"
    default: "app.main:app"
  - name: api_workers
    prompt: "Uvicorn worker count"
    default: "2"
  - name: worker_command
    prompt: "Background worker command"
    default: "celery -A app.worker worker --loglevel=info"
  - name: db_user
    prompt: "Database username"
    default: "app"
  - name: db_password
    prompt: "Database password"
    generate: true
  - name: db_name
    prompt: "Database name"
    default: "app"
  - name: app_secret
    prompt: "Application secret"
    generate: true
