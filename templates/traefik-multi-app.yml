name: "Traefik + Multiple Apps"
description: "Traefik reverse proxy with dashboard, routing multiple apps by hostname. Includes Let's Encrypt TLS. Ideal for microservices on a single VPS."
category: "microservices"
version: "1.0"
requires:
  docker: true
  traefik: true
reverse_proxy:
  type: traefik
  global_config: |
    entryPoints:
      web:
        address: ":80"
      websecure:
        address: ":443"
    certificatesResolvers:
      letsencrypt:
        acme:
          email: "{{acme_email}}"
          storage: /letsencrypt/acme.json
          httpChallenge:
            entryPoint: web
services:
  - name: traefik
    image: "traefik:v3.1"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
      - traefik_data:/letsencrypt
    restart: unless-stopped
    env: []
  - name: app
    build: true
    ports:
      - "{{app_port}}"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`{{domain}}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port={{app_port}}
    env: []
volumes:
  - traefik_data
inputs:
  - name: domain
    prompt: "Domain for your app"
    example: "app.example.com"
  - name: acme_email
    prompt: "Email for Let's Encrypt"
    example: "admin@example.com"
  - name: app_port
    prompt: "Port your app listens on"
    default: "3000"
