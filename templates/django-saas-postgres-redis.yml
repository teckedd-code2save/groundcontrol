name: "Django SaaS + PostgreSQL + Redis"
description: "Django/Gunicorn production stack with Caddy TLS, PostgreSQL, Redis, static/media volumes, healthchecks, and worker-ready environment."
category: "saas"
version: "1.0"
requires:
  docker: true
  caddy: true
reverse_proxy:
  type: caddy
  sites:
    - domain: "{{domain}}"
      proxy_to: "web:{{app_port}}"
services:
  - name: web
    build: true
    command: "gunicorn {{django_project}}.wsgi:application --bind 0.0.0.0:{{app_port}} --workers {{web_workers}} --timeout 60"
    ports:
      - "{{app_port}}"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    env:
      - DJANGO_SETTINGS_MODULE={{django_project}}.settings
      - SECRET_KEY={{app_secret}}
      - DEBUG=false
      - ALLOWED_HOSTS={{domain}}
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: "python manage.py check --deploy >/dev/null 2>&1 || exit 1"
      interval: "30s"
      timeout: "10s"
      retries: 5
  - name: worker
    build: true
    command: "celery -A {{django_project}} worker --loglevel=info"
    env:
      - DJANGO_SETTINGS_MODULE={{django_project}}.settings
      - SECRET_KEY={{app_secret}}
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  - name: postgres
    image: "postgres:16-alpine"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env:
      - POSTGRES_USER={{db_user}}
      - POSTGRES_PASSWORD={{db_password}}
      - POSTGRES_DB={{db_name}}
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U {{db_user}} -d {{db_name}}"
      interval: "10s"
      timeout: "3s"
      retries: 5
  - name: redis
    image: "redis:7-alpine"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: "redis-cli ping | grep PONG"
      interval: "10s"
      timeout: "3s"
      retries: 5
volumes:
  - postgres_data
  - redis_data
  - static_data
  - media_data
inputs:
  - name: domain
    prompt: "Domain for your Django app"
    example: "app.example.com"
  - name: app_port
    prompt: "Internal web port"
    default: "8000"
  - name: django_project
    prompt: "Django project module"
    default: "config"
  - name: web_workers
    prompt: "Gunicorn worker count"
    default: "3"
  - name: db_user
    prompt: "Database username"
    default: "app"
  - name: db_password
    prompt: "Database password"
    generate: true
  - name: db_name
    prompt: "Database name"
    default: "app"
  - name: app_secret
    prompt: "Django SECRET_KEY"
    generate: true
