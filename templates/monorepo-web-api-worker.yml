name: "Monorepo Web + API + Worker"
description: "Production monorepo template for teams shipping separate web, API, worker, PostgreSQL, and Redis services behind Caddy."
category: "monorepo"
version: "1.0"
requires:
  docker: true
  caddy: true
reverse_proxy:
  type: caddy
  sites:
    - domain: "{{web_domain}}"
      proxy_to: "web:{{web_port}}"
    - domain: "{{api_domain}}"
      proxy_to: "api:{{api_port}}"
services:
  - name: web
    build: true
    command: "{{web_command}}"
    ports:
      - "{{web_port}}"
    env:
      - NODE_ENV=production
      - PORT={{web_port}}
      - API_URL=https://{{api_domain}}
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://localhost:{{web_port}}/health || wget -qO- http://localhost:{{web_port}}/api/health || exit 1"
      interval: "30s"
      timeout: "5s"
      retries: 5
  - name: api
    build: true
    command: "{{api_command}}"
    ports:
      - "{{api_port}}"
    env:
      - NODE_ENV=production
      - PORT={{api_port}}
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379
      - APP_SECRET={{app_secret}}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: "wget -qO- http://localhost:{{api_port}}/health || exit 1"
      interval: "30s"
      timeout: "5s"
      retries: 5
  - name: worker
    build: true
    command: "{{worker_command}}"
    env:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://{{db_user}}:{{db_password}}@postgres:5432/{{db_name}}
      - REDIS_URL=redis://redis:6379
      - APP_SECRET={{app_secret}}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  - name: postgres
    image: "postgres:16-alpine"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env:
      - POSTGRES_USER={{db_user}}
      - POSTGRES_PASSWORD={{db_password}}
      - POSTGRES_DB={{db_name}}
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U {{db_user}} -d {{db_name}}"
      interval: "10s"
      timeout: "3s"
      retries: 5
  - name: redis
    image: "redis:7-alpine"
    command: "redis-server --appendonly yes"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: "redis-cli ping | grep PONG"
      interval: "10s"
      timeout: "3s"
      retries: 5
volumes:
  - postgres_data
  - redis_data
inputs:
  - name: web_domain
    prompt: "Web app domain"
    example: "app.example.com"
  - name: api_domain
    prompt: "API domain"
    example: "api.example.com"
  - name: web_port
    prompt: "Internal web port"
    default: "3000"
  - name: api_port
    prompt: "Internal API port"
    default: "4000"
  - name: web_command
    prompt: "Web start command"
    default: "npm run start:web"
  - name: api_command
    prompt: "API start command"
    default: "npm run start:api"
  - name: worker_command
    prompt: "Worker command"
    default: "npm run start:worker"
  - name: db_user
    prompt: "Database username"
    default: "app"
  - name: db_password
    prompt: "Database password"
    generate: true
  - name: db_name
    prompt: "Database name"
    default: "app"
  - name: app_secret
    prompt: "Application secret"
    generate: true
