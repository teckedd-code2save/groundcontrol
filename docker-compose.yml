version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/teckedd-code2save/groundcontrol:latest
    container_name: groundcontrol-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-3003}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/prod.db
    volumes:
      - groundcontrol-db:/app/prisma
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt:/opt
      - /etc:/etc
      - /var/www:/var/www
      - /root/.ssh:/root/.ssh:ro
    networks:
      - groundcontrol
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/vps/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  groundcontrol-db:

networks:
  groundcontrol:
    driver: bridge
