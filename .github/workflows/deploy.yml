name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |
            cd /opt/groundcontrol || exit 1
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Sync docker-compose.yml from repo so infra changes (ports, env, volumes) propagate
            curl -sfL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml" \
              -o docker-compose.yml || echo "docker-compose.yml sync skipped (using existing)"
            docker compose pull
            docker compose run --rm --no-deps web npx prisma migrate deploy --schema /app/db/schema.prisma
            docker compose up -d --remove-orphans
            for i in $(seq 1 30); do
              if docker compose ps web | grep -q healthy; then
                break
              fi
              sleep 2
            done
            docker compose ps
            docker compose logs --tail=80 web
            docker logout ghcr.io
            docker system prune -f
